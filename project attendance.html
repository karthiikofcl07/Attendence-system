/* ============================================================
   TEC Attendance Management System — single-file app
   Department of AI & Data Science, Trichy Engineering College
   Storage: localStorage (acts as the DB layer with a repository
   pattern). Auth: hashed password + signed token (HMAC-like).
============================================================ */

/* ---------- utilities ---------- */
const $ = (sel, el=document) => el.querySelector(sel);
const uid = () => Math.random().toString(36).slice(2,10);
const todayISO = () => new Date().toISOString().slice(0,10);
const fmtDate = (iso) => { const d=new Date(iso+'T00:00'); return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); };
const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));
async function sha256(s){const b=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',b);return [...new Uint8Array(h)].map(x=>x.toString(16).padStart(2,'0')).join('');}
function toast(msg,type='success'){
  const wrap = $('#toasts') || (()=>{const d=document.createElement('div');d.id='toasts';d.className='fixed bottom-5 right-5 z-[100] flex flex-col gap-2';document.body.appendChild(d);return d;})();
  const el=document.createElement('div');
  const colors={success:'bg-emerald-600',error:'bg-red-600',info:'bg-slate-800',warn:'bg-amber-600'};
  el.className=`toast text-white px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium ${colors[type]||colors.info}`;
  el.textContent=msg; wrap.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(6px)';setTimeout(()=>el.remove(),200);},2600);
}

/* ---------- seed data ---------- */
const TAMIL_FIRST_M=['Arun','Bala','Chandran','Dinesh','Ezhil','Ganesh','Hariharan','Iniyan','Jeeva','Karthik','Logesh','Manikandan','Naveen','Om','Prasanth','Ragul','Sathish','Tamil','Udhaya','Vignesh','Yogesh','Aravind','Barath','Deepak','Elango','Gokul','Harish','Jagan','Kavin','Mohan'];
const TAMIL_FIRST_F=['Aishwarya','Bhavana','Divya','Eshwari','Gayathri','Hemalatha','Indhu','Janani','Kavya','Lavanya','Meena','Nithya','Priya','Ranjani','Sowmya','Thanya','Uma','Vaishnavi','Yamuna','Abirami'];
const TAMIL_LAST=['Kumar','Raj','Prabhu','Sundar','Murugan','Selvam','Krishnan','Ramesh','Muthu','Palani','Saravanan','Anand','Balaji','Chandran','Devan','Elangovan','Ganapathy','Iyer','Jayaraman','Karthikeyan'];
const SUBJECTS=[
  {code:'AI3401',name:'Machine Learning',credit:4},
  {code:'AI3402',name:'Deep Learning',credit:4},
  {code:'AI3403',name:'Data Analytics',credit:3},
  {code:'AI3404',name:'Computer Vision',credit:3},
  {code:'AI3405',name:'Natural Language Processing',credit:3},
  {code:'AI3406',name:'Big Data Technologies',credit:3},
];
const HOURS=['1st Hour (09:00-09:50)','2nd Hour (09:50-10:40)','3rd Hour (11:00-11:50)','4th Hour (11:50-12:40)','5th Hour (01:30-02:20)','6th Hour (02:20-03:10)'];

function makeStudents(){
  const arr=[];
  for(let i=1;i<=40;i++){
    const isF = i%3===0;
    const fn = isF ? TAMIL_FIRST_F[(i*7)%TAMIL_FIRST_F.length] : TAMIL_FIRST_M[(i*3)%TAMIL_FIRST_M.length];
    const ln = TAMIL_LAST[(i*5)%TAMIL_LAST.length];
    const reg = '23AI'+String(i).padStart(3,'0');
    const name = `${fn} ${ln.charAt(0)}.`.length? `${fn} ${ln}` : fn;
    arr.push({
      id:reg,
      regNo:reg,
      rollNo:'AI'+String(i).padStart(2,'0'),
      name:`${fn} ${ln}`,
      gender:isF?'Female':'Male',
      department:'AI & Data Science',
      section:'A',
      year:'III',
      semester:'5',
      email:`${fn}.${ln}`.toLowerCase().replace(/\s+/g,'')+`@tec.ac.in`,
      phone:'+91 9'+String(400000000+i*137891).slice(0,9),
    });
  }
  return arr;
}

/* ---------- repository (localStorage) ---------- */
const DB_KEY='tec_ams_v1';
const Repo = {
  load(){ try{return JSON.parse(localStorage.getItem(DB_KEY))||null}catch{return null} },
  save(db){ localStorage.setItem(DB_KEY, JSON.stringify(db)); },
  reset(){ localStorage.removeItem(DB_KEY); },
};
async function initDB(force=false){
  let db = Repo.load();
  if(db && !force) return db;
  const passHash = await sha256('faculty@123');
  db = {
    faculty:{
      id:'FAC1024',
      name:'Dr. Meenakshi Subramanian',
      designation:'Associate Professor',
      department:'AI & Data Science',
      email:'meenakshi.s@tec.ac.in',
      phone:'+91 9843012567',
      username:'faculty',
      passHash,
      avatar:'MS',
      lastLogin:null,
    },
    department:{name:'Artificial Intelligence and Data Science',code:'AIDS',college:'Trichy Engineering College',location:'Trichy, Tamil Nadu'},
    students: makeStudents(),
    subjects: SUBJECTS,
    hours: HOURS,
    attendance: [],   // {id,date,hour,subject,section,semester,records:[{regNo,status}], createdAt, updatedAt, lockedByAdmin:false}
    audit: [],
    settings:{lowThreshold:75, criticalThreshold:60},
  };
  // seed 60 days of attendance
  const start=new Date(); start.setDate(start.getDate()-60);
  for(let d=0; d<60; d++){
    const day = new Date(start); day.setDate(start.getDate()+d);
    if(day.getDay()===0) continue; // skip Sunday
    const iso = day.toISOString().slice(0,10);
    // 3 random classes / day
    const shuffled = [...SUBJECTS].sort(()=>Math.random()-0.5).slice(0,3);
    shuffled.forEach((sub,idx)=>{
      const records = db.students.map(s=>{
        // realistic distribution — some students weaker
        const seed = (parseInt(s.regNo.slice(-3))*13 + d) % 100;
        const bias = parseInt(s.regNo.slice(-3)) % 10; // 0..9
        const r = Math.random()*100;
        let status='P';
        if(bias>=8){ // weaker students
          if(r<18) status='A'; else if(r<24) status='L'; else if(r<26) status='V';
        } else if(bias>=5){
          if(r<8) status='A'; else if(r<12) status='L'; else if(r<13) status='V';
        } else {
          if(r<4) status='A'; else if(r<7) status='L';
        }
        return {regNo:s.regNo,status};
      });
      db.attendance.push({
        id:uid(),
        date:iso, hour:HOURS[idx+1], subject:sub.code,
        section:'A', semester:'5',
        records, createdAt:iso, updatedAt:iso, lockedByAdmin:false,
      });
    });
  }
  db.audit.push({at:new Date().toISOString(),actor:'system',action:'DB_SEED',detail:`Seeded ${db.attendance.length} attendance sessions`});
  Repo.save(db);
  return db;
}

/* ---------- auth ---------- */
const TOKEN_KEY='tec_ams_token';
async function signToken(payload){
  const body = btoa(JSON.stringify(payload));
  const sig = (await sha256(body+'|tec-secret')).slice(0,32);
  return `${body}.${sig}`;
}
async function verifyToken(tok){
  if(!tok||!tok.includes('.')) return null;
  const [body,sig]=tok.split('.');
  const expect = (await sha256(body+'|tec-secret')).slice(0,32);
  if(sig!==expect) return null;
  try{ const p=JSON.parse(atob(body)); if(p.exp && p.exp<Date.now()) return null; return p; }catch{return null}
}
async function login(u,p){
  const db = await initDB();
  if(u!==db.faculty.username) throw new Error('Invalid username or password');
  const h = await sha256(p);
  if(h!==db.faculty.passHash) throw new Error('Invalid username or password');
  db.faculty.lastLogin = new Date().toISOString();
  db.audit.push({at:new Date().toISOString(),actor:db.faculty.username,action:'LOGIN',detail:'Faculty login successful'});
  Repo.save(db);
  const tok = await signToken({sub:db.faculty.id,u:db.faculty.username,exp:Date.now()+8*3600*1000});
  localStorage.setItem(TOKEN_KEY,tok);
  return tok;
}
function logout(){ localStorage.removeItem(TOKEN_KEY); location.hash='#/login'; render(); }

/* ---------- domain services ---------- */
const Svc = {
  getDB(){ return Repo.load(); },
  saveDB(db){ Repo.save(db); },
  studentAttendanceStats(regNo, opts={}){
    const db=this.getDB();
    let sessions = db.attendance;
    if(opts.subject) sessions = sessions.filter(s=>s.subject===opts.subject);
    if(opts.from) sessions = sessions.filter(s=>s.date>=opts.from);
    if(opts.to) sessions = sessions.filter(s=>s.date<=opts.to);
    let P=0,A=0,L=0,V=0,total=0;
    sessions.forEach(sess=>{
      const rec = sess.records.find(r=>r.regNo===regNo);
      if(!rec) return; total++;
      if(rec.status==='P')P++; else if(rec.status==='A')A++; else if(rec.status==='L')L++; else if(rec.status==='V')V++;
    });
    // Late counts as present for %
    const attended = P+L;
    const pct = total? (attended/total*100) : 0;
    return {P,A,L,V,total,attended,pct};
  },
  overallStats(opts={}){
    const db=this.getDB();
    return db.students.map(s=>({student:s, ...this.studentAttendanceStats(s.regNo,opts)}));
  },
  todayStats(){
    const db=this.getDB(); const t=todayISO();
    const today = db.attendance.filter(a=>a.date===t);
    let P=0,A=0,L=0,V=0,total=0;
    today.forEach(sess=>sess.records.forEach(r=>{total++; if(r.status==='P')P++; else if(r.status==='A')A++; else if(r.status==='L')L++; else if(r.status==='V')V++;}));
    return {sessions:today.length, P,A,L,V,total, pct: total? ((P+L)/total*100):0};
  },
  saveAttendance({date,hour,subject,section,semester,records}){
    const db=this.getDB();
    // validate
    if(!date||!hour||!subject) throw new Error('Missing required fields');
    if(!records || records.length===0) throw new Error('Attendance is empty');
    if(records.some(r=>!r.status)) throw new Error('Every student must have a status');
    if(new Date(date) > new Date(todayISO())) throw new Error('Cannot mark attendance for future dates');
    // duplicate check
    const dup = db.attendance.find(a=>a.date===date && a.hour===hour && a.subject===subject && a.section===section && a.semester===semester);
    if(dup){
      // allow edit only if same day and not locked
      if(dup.date!==todayISO() && !dup.lockedByAdmin===false) {
        // (kept simple) allow edit only on same day unless admin unlocked
      }
      if(dup.date!==todayISO() && dup.lockedByAdmin!==true){
        throw new Error('Previous day attendance is locked. Ask admin to unlock.');
      }
      dup.records=records; dup.updatedAt=new Date().toISOString();
      db.audit.push({at:new Date().toISOString(),actor:db.faculty.username,action:'ATTENDANCE_UPDATE',detail:`${subject} ${date} ${hour}`});
    } else {
      db.attendance.push({id:uid(),date,hour,subject,section,semester,records,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),lockedByAdmin:false});
      db.audit.push({at:new Date().toISOString(),actor:db.faculty.username,action:'ATTENDANCE_CREATE',detail:`${subject} ${date} ${hour}`});
    }
    Repo.save(db);
  },
  findSession(q){
    const db=this.getDB();
    return db.attendance.find(a=>a.date===q.date&&a.hour===q.hour&&a.subject===q.subject&&a.section===q.section&&a.semester===q.semester);
  },
};

async function render(){
  await initDB();
  const hash = location.hash || '#/dashboard';
  const tok = await verifyToken(localStorage.getItem(TOKEN_KEY));
  if(!tok && hash!=='#/login'){ location.hash='#/login'; return; }
  if(tok && hash==='#/login'){ location.hash='#/dashboard'; return; }
  const fn = routes[hash] || renderDashboard;
  await fn();
}
window.addEventListener('hashchange',render);
window.addEventListener('load',render);

function drawDashboardCharts(){
  const db=Svc.getDB();
  // monthly (30 days)
  const days=[]; const pcts=[];
  for(let i=29;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const iso=d.toISOString().slice(0,10);
    const sess=db.attendance.filter(a=>a.date===iso);
    let tot=0,pl=0;
    sess.forEach(s=>s.records.forEach(r=>{tot++; if(r.status==='P'||r.status==='L') pl++;}));
    days.push(d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}));
    pcts.push(tot?+(pl/tot*100).toFixed(1):0);
  }
  new Chart($('#chartMonthly'),{type:'line',data:{labels:days,datasets:[{label:'Attendance %',data:pcts,borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.12)',fill:true,tension:.35,pointRadius:0,borderWidth:2}]},options:{plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}}}});

  // subject
  const subs=db.subjects.map(s=>{
    const sess=db.attendance.filter(a=>a.subject===s.code);
    let tot=0,pl=0;
    sess.forEach(x=>x.records.forEach(r=>{tot++; if(r.status==='P'||r.status==='L') pl++;}));
    return {code:s.code, pct: tot?+(pl/tot*100).toFixed(1):0};
  });
  new Chart($('#chartSubject'),{type:'doughnut',data:{labels:subs.map(s=>s.code),datasets:[{data:subs.map(s=>s.pct),backgroundColor:['#2563eb','#0ea5e9','#7c3aed','#16a34a','#f59e0b','#ef4444']}]},options:{plugins:{legend:{position:'bottom',labels:{font:{size:10}}}}}});

  // weekly (7 days)
  const wlabels=[]; const wp=[],wa=[],wl=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const iso=d.toISOString().slice(0,10);
    const sess=db.attendance.filter(a=>a.date===iso);
    let P=0,A=0,L=0;
    sess.forEach(s=>s.records.forEach(r=>{if(r.status==='P')P++;else if(r.status==='A')A++;else if(r.status==='L')L++;}));
    wlabels.push(d.toLocaleDateString('en-IN',{weekday:'short'})); wp.push(P); wa.push(A); wl.push(L);
  }
  new Chart($('#chartWeekly'),{type:'bar',data:{labels:wlabels,datasets:[
    {label:'Present',data:wp,backgroundColor:'#16a34a'},
    {label:'Absent',data:wa,backgroundColor:'#dc2626'},
    {label:'Late',data:wl,backgroundColor:'#ca8a04'},
  ]},options:{plugins:{legend:{position:'bottom',labels:{font:{size:10}}}},scales:{x:{stacked:true},y:{stacked:true}}}});
}

            </tbody>
          </table>
        </div>
      </div>

    function rowHTML(s,i){
      const st=state.statuses[s.regNo]||'P';
      return `<tr class="row-hover" data-name="${s.name.toLowerCase()}" data-reg="${s.regNo.toLowerCase()}">
        <td class="px-4 py-3 text-slate-500">${i+1}</td>

          </div>
        </td>

      // reset statuses to P then re-draw so existing session repopulates
      state.statuses=Object.fromEntries(db.students.map(s=>[s.regNo,'P']));
      draw();
    }));
    $('#qSearch').addEventListener('input',e=>{
      const q=e.target.value.toLowerCase();

        const ok = tr.dataset.name.includes(q)||tr.dataset.reg.includes(q);
        tr.style.display = ok?'':'none';
      });
    });
    $('#btnSave').addEventListener('click', ()=>{
      try{
        const records=db.students.map(s=>({regNo:s.regNo,status:state.statuses[s.regNo]||'P'}));
        Svc.saveAttendance({date:state.date,hour:state.hour,subject:state.subject,section:state.section,semester:state.semester,records});
        toast('Attendance saved successfully','success');
        draw();
      }catch(e){ toast(e.message,'error'); }
    });
    window.setStatus=(reg,st,btn)=>{
      state.statuses[reg]=st;
      const parent=btn.parentElement;
      parent.querySelectorAll('.status-pill').forEach(b=>b.className=b.className.replace(/active-[PALV]/,''));
      btn.classList.add('active-'+st);
      // update counters
      const c={P:0,A:0,L:0,V:0}; Object.values(state.statuses).forEach(s=>c[s]++);
      // lightweight update
    };
    window.bulkStatus=(st)=>{ db.students.forEach(s=>state.statuses[s.regNo]=st); draw(); };
  };
  draw();
}

/* ---------- history ---------- */
async function renderHistory(){
  const db=Svc.getDB();
  let filters={date:todayISO(), subject:'', q:''};
  const draw=()=>{
    let sessions=[...db.attendance].sort((a,b)=>(b.date+b.updatedAt).localeCompare(a.date+a.updatedAt));
    if(filters.date) sessions=sessions.filter(s=>s.date===filters.date);
    if(filters.subject) sessions=sessions.filter(s=>s.subject===filters.subject);
    let rows=[];
    sessions.forEach(sess=>{
      sess.records.forEach(r=>{
        const stu=db.students.find(s=>s.regNo===r.regNo); if(!stu) return;
        if(filters.q){
          const q=filters.q.toLowerCase();
          if(!stu.name.toLowerCase().includes(q) && !stu.regNo.toLowerCase().includes(q)) return;
        }
        rows.push({session:sess,student:stu,status:r.status});
      });
    });
    const summary={P:0,A:0,L:0,V:0};
    rows.forEach(r=>summary[r.status]++);
    $('#app').innerHTML = shell('#/history',`
      <div class="flex flex-wrap items-end justify-between gap-3 mb-5">
        <div>
          <h1 class="text-2xl font-bold">Attendance History</h1>
          <p class="text-sm text-slate-500">Browse and search historical attendance records.</p>
        </div>
      </div>
      <div class="card p-4 mb-4">
        <div class="grid md:grid-cols-4 gap-3">
          <div><label class="label">Date</label><input type="date" class="input" id="hDate" value="${filters.date}" max="${todayISO()}"/></div>
          <div><label class="label">Subject</label>
            <select class="select" id="hSub"><option value="">All subjects</option>${db.subjects.map(s=>`<option value="${s.code}" ${filters.subject===s.code?'selected':''}>${s.code} — ${s.name}</option>`).join('')}</select></div>
          <div class="md:col-span-2"><label class="label">Search student</label><input class="input" id="hQ" placeholder="Name or Register no..." value="${filters.q}"/></div>
        </div>
        <div class="mt-3 flex flex-wrap gap-2">
          <span class="badge b-present">Present ${summary.P}</span>
          <span class="badge b-absent">Absent ${summary.A}</span>
          <span class="badge b-late">Late ${summary.L}</span>
          <span class="badge b-leave">Leave ${summary.V}</span>
          <span class="badge b-none">Total records ${rows.length}</span>
          <button class="btn btn-outline ml-auto" onclick="window.__clearFilters()">Reset</button>
        </div>
      </div>
      <div class="card overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-xs uppercase text-slate-500">
              <tr>
                <th class="text-left px-4 py-3">Date</th>
                <th class="text-left px-4 py-3">Hour</th>
                <th class="text-left px-4 py-3">Subject</th>
                <th class="text-left px-4 py-3">Register No</th>
                <th class="text-left px-4 py-3">Student</th>
                <th class="text-left px-4 py-3">Status</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
              ${rows.length===0?`<tr><td colspan="6" class="text-center text-slate-500 py-10">No attendance records found.</td></tr>`:
              rows.map(r=>`<tr class="row-hover">
                <td class="px-4 py-3">${fmtDate(r.session.date)}</td>
                <td class="px-4 py-3 text-slate-600">${r.session.hour}</td>
                <td class="px-4 py-3 font-semibold">${r.session.subject}</td>
                <td class="px-4 py-3 font-mono">${r.student.regNo}</td>
                <td class="px-4 py-3">${r.student.name}</td>
                <td class="px-4 py-3"><span class="badge b-${{P:'present',A:'absent',L:'late',V:'leave'}[r.status]}">${{P:'Present',A:'Absent',L:'Late',V:'Leave'}[r.status]}</span></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `);
    $('#hDate').addEventListener('change',e=>{filters.date=e.target.value; draw();});
    $('#hSub').addEventListener('change',e=>{filters.subject=e.target.value; draw();});
    $('#hQ').addEventListener('input',e=>{filters.q=e.target.value; draw();});
    window.__clearFilters=()=>{filters={date:'',subject:'',q:''}; draw();};
  };
  draw();
}

                  <td class="px-4 py-3">${r.student.name}</td>
                  <td class="px-4 py-3">${r.student.gender}</td>
                  <td class="px-4 py-3 text-slate-600">${r.student.email}</td>
                  <td class="px-4 py-3 text-slate-600">${r.student.phone}</td>
                  <td class="px-4 py-3 font-bold ${c}">${r.pct.toFixed(1)}%</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `);
    $('#stuQ').addEventListener('input',e=>{q=e.target.value; draw();});
  };
  draw();
}

/* ---------- analytics ---------- */
async function renderAnalytics(){
  const db=Svc.getDB();
  const stats=Svc.overallStats().filter(s=>s.total>0).sort((a,b)=>b.pct-a.pct);
  const top=stats.slice(0,5);
  const low=[...stats].reverse().slice(0,5);
  const below75=stats.filter(s=>s.pct<db.settings.lowThreshold);
  const below60=stats.filter(s=>s.pct<db.settings.criticalThreshold);
  const avg = stats.reduce((a,b)=>a+b.pct,0)/(stats.length||1);
  $('#app').innerHTML = shell('#/analytics',`
    <div class="flex flex-wrap items-end justify-between gap-3 mb-5">
      <div>
        <h1 class="text-2xl font-bold">Student Analytics</h1>
        <p class="text-sm text-slate-500">Attendance intelligence across all sessions.</p>
      </div>
    </div>
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
      <div class="card p-4"><div class="text-xs uppercase text-slate-500 font-semibold">Class Average</div><div class="text-3xl font-bold text-blue-700 mt-1">${avg.toFixed(1)}%</div></div>
      <div class="card p-4"><div class="text-xs uppercase text-slate-500 font-semibold">Below 75%</div><div class="text-3xl font-bold text-amber-600 mt-1">${below75.length}</div></div>
      <div class="card p-4"><div class="text-xs uppercase text-slate-500 font-semibold">Critical (&lt;60%)</div><div class="text-3xl font-bold text-red-600 mt-1">${below60.length}</div></div>
      <div class="card p-4"><div class="text-xs uppercase text-slate-500 font-semibold">Total Sessions</div><div class="text-3xl font-bold mt-1">${db.attendance.length}</div></div>
    </div>

    <div class="grid lg:grid-cols-2 gap-4 mb-4">
      <div class="card p-4">
        <h3 class="font-semibold mb-2">Top Attendance</h3>
        <div class="space-y-2">
          ${top.map(t=>`<div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-emerald-100 text-emerald-700 grid place-items-center font-semibold text-xs">${t.student.name.split(' ').map(x=>x[0]).slice(0,2).join('')}</div>
            <div class="flex-1 min-w-0"><div class="text-sm font-semibold">${t.student.name}</div><div class="text-xs text-slate-500">${t.student.regNo}</div></div>
            <div class="text-emerald-600 font-bold">${t.pct.toFixed(1)}%</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="card p-4">
        <h3 class="font-semibold mb-2">Lowest Attendance</h3>
        <div class="space-y-2">
          ${low.map(t=>`<div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-red-100 text-red-700 grid place-items-center font-semibold text-xs">${t.student.name.split(' ').map(x=>x[0]).slice(0,2).join('')}</div>
            <div class="flex-1 min-w-0"><div class="text-sm font-semibold">${t.student.name}</div><div class="text-xs text-slate-500">${t.student.regNo}</div></div>
            <div class="${t.pct<60?'text-red-600':'text-amber-600'} font-bold">${t.pct.toFixed(1)}%</div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="card p-4 mb-4">
      <h3 class="font-semibold mb-3">Attendance Distribution (all students)</h3>
      <canvas id="chartDist" height="90"></canvas>
    </div>

    <div class="card p-4 mb-4">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold">30-day Attendance Heatmap</h3>
        <div class="text-xs text-slate-500 flex items-center gap-2">
          <span class="heat" style="background:#dcfce7"></span> ≥90%
          <span class="heat" style="background:#86efac"></span> 75-90%
          <span class="heat" style="background:#fde68a"></span> 60-75%
          <span class="heat" style="background:#fca5a5"></span> &lt;60%
          <span class="heat" style="background:#e5e7eb"></span> No class
        </div>
      </div>
      <div id="heatmap" class="overflow-x-auto"></div>
    </div>

    <div class="card overflow-hidden">
      <div class="p-4 border-b border-slate-200"><h3 class="font-semibold">Per-Student Breakdown</h3></div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-xs uppercase text-slate-500">
            <tr>
              <th class="text-left px-4 py-3">Register No</th>
              <th class="text-left px-4 py-3">Name</th>
              <th class="text-right px-4 py-3">Present</th>
              <th class="text-right px-4 py-3">Absent</th>
              <th class="text-right px-4 py-3">Late</th>
              <th class="text-right px-4 py-3">Leave</th>
              <th class="text-right px-4 py-3">Total</th>
              <th class="text-left px-4 py-3">%</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100">
            ${stats.map(s=>{
              const c=s.pct>=75?'bg-emerald-500':s.pct>=60?'bg-amber-500':'bg-red-500';
              return `<tr class="row-hover">
                <td class="px-4 py-3 font-mono font-semibold">${s.student.regNo}</td>
                <td class="px-4 py-3">${s.student.name}</td>
                <td class="px-4 py-3 text-right">${s.P}</td>
                <td class="px-4 py-3 text-right">${s.A}</td>
                <td class="px-4 py-3 text-right">${s.L}</td>
                <td class="px-4 py-3 text-right">${s.V}</td>
                <td class="px-4 py-3 text-right">${s.total}</td>
                <td class="px-4 py-3">
                  <div class="flex items-center gap-2">
                    <div class="w-28 h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-full ${c}" style="width:${clamp(s.pct,0,100)}%"></div></div>
                    <span class="font-semibold">${s.pct.toFixed(1)}%</span>
                  </div>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `);
  // dist chart
  const buckets=[0,0,0,0,0]; // <50, 50-60, 60-75, 75-90, 90+
  stats.forEach(s=>{ const p=s.pct; if(p<50)buckets[0]++; else if(p<60)buckets[1]++; else if(p<75)buckets[2]++; else if(p<90)buckets[3]++; else buckets[4]++; });
  new Chart($('#chartDist'),{type:'bar',data:{labels:['<50%','50-60%','60-75%','75-90%','≥90%'],datasets:[{data:buckets,backgroundColor:['#dc2626','#ea580c','#ca8a04','#16a34a','#059669']}]},options:{plugins:{legend:{display:false}}}});
  // heatmap
  const hm=$('#heatmap');
  hm.innerHTML = db.students.slice(0,40).map(s=>{
    let cells='';
    for(let i=29;i>=0;i--){
      const d=new Date(); d.setDate(d.getDate()-i);
      const iso=d.toISOString().slice(0,10);
      const sess=db.attendance.filter(a=>a.date===iso);
      if(sess.length===0){ cells+=`<span class="heat" style="background:#e5e7eb" title="${iso} no class"></span>`; continue; }
      let tot=0,pl=0;
      sess.forEach(x=>{ const r=x.records.find(y=>y.regNo===s.regNo); if(r){tot++; if(r.status==='P'||r.status==='L')pl++;} });
      if(tot===0){cells+=`<span class="heat" style="background:#e5e7eb"></span>`; continue;}
      const p=pl/tot*100;
      const col = p>=90?'#dcfce7':p>=75?'#86efac':p>=60?'#fde68a':'#fca5a5';
      cells+=`<span class="heat" style="background:${col}" title="${s.regNo} ${iso} ${p.toFixed(0)}%"></span>`;
    }
    return `<div class="flex items-center gap-2 py-0.5"><div class="w-24 text-xs font-mono text-slate-500 shrink-0">${s.regNo}</div><div>${cells}</div></div>`;
  }).join('');
}

/* ---------- reports ---------- */
async function renderReports(){
  const db=Svc.getDB();
  const today=todayISO();
  $('#app').innerHTML = shell('#/reports',`
    <div class="mb-5">
      <h1 class="text-2xl font-bold">Reports</h1>
      <p class="text-sm text-slate-500">Generate and export attendance reports as PDF, Excel, or CSV.</p>
    </div>
    <div class="card p-4 mb-4">
      <div class="grid md:grid-cols-4 gap-3">
        <div><label class="label">Report Type</label>
          <select id="rType" class="select">
            <option value="daily">Daily Report</option>
            <option value="weekly">Weekly Report</option>
            <option value="monthly">Monthly Report</option>
            <option value="semester">Semester Report</option>
          </select>
        </div>
        <div><label class="label">From</label><input type="date" id="rFrom" class="input" value="${today}"/></div>
        <div><label class="label">To</label><input type="date" id="rTo" class="input" value="${today}" max="${today}"/></div>
        <div><label class="label">Subject (optional)</label>
          <select id="rSub" class="select"><option value="">All subjects</option>${db.subjects.map(s=>`<option value="${s.code}">${s.code} — ${s.name}</option>`).join('')}</select>
        </div>
      </div>
      <div class="mt-3 flex flex-wrap gap-2">
        <button class="btn btn-primary" id="rGen">Generate Preview</button>
        <button class="btn btn-outline" id="rPdf">Export PDF</button>
        <button class="btn btn-outline" id="rXlsx">Export Excel</button>
        <button class="btn btn-outline" id="rCsv">Export CSV</button>
      </div>
    </div>
    <div id="rOut" class="card p-4"><div class="text-sm text-slate-500">Select a range and click <b>Generate Preview</b>.</div></div>
  `);
  const setRange=()=>{
    const t=$('#rType').value; const to=new Date(); let from=new Date();
    if(t==='daily'){from=new Date();}
    else if(t==='weekly'){from.setDate(to.getDate()-6);}
    else if(t==='monthly'){from.setDate(to.getDate()-29);}
    else {from.setDate(to.getDate()-119);}
    $('#rFrom').value=from.toISOString().slice(0,10);
    $('#rTo').value=to.toISOString().slice(0,10);
  };
  $('#rType').addEventListener('change',setRange);
  const build=()=>{
    const from=$('#rFrom').value, to=$('#rTo').value, sub=$('#rSub').value;
    const stats = db.students.map(s=>({student:s, ...Svc.studentAttendanceStats(s.regNo,{from,to,subject:sub||undefined})}));
    return {from,to,sub,stats};
  };
  $('#rGen').addEventListener('click',()=>{
    const {from,to,sub,stats}=build();
    const subLabel = sub? (db.subjects.find(s=>s.code===sub)?.name||sub) : 'All Subjects';
    $('#rOut').innerHTML = `
      <div class="flex flex-wrap items-center justify-between mb-3 gap-2">
        <div>
          <h3 class="font-semibold">Attendance Report</h3>
          <div class="text-xs text-slate-500">${fmtDate(from)} → ${fmtDate(to)} • ${subLabel}</div>
        </div>
        <div class="text-xs text-slate-500">Total students: ${stats.length}</div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-xs uppercase text-slate-500"><tr>
            <th class="text-left px-3 py-2">Reg No</th><th class="text-left px-3 py-2">Name</th>
            <th class="text-right px-3 py-2">P</th><th class="text-right px-3 py-2">A</th>
            <th class="text-right px-3 py-2">L</th><th class="text-right px-3 py-2">V</th>
            <th class="text-right px-3 py-2">Total</th><th class="text-right px-3 py-2">%</th>
          </tr></thead>
          <tbody class="divide-y divide-slate-100">
            ${stats.map(s=>`<tr class="row-hover">
              <td class="px-3 py-2 font-mono">${s.student.regNo}</td>
              <td class="px-3 py-2">${s.student.name}</td>
              <td class="px-3 py-2 text-right">${s.P}</td><td class="px-3 py-2 text-right">${s.A}</td>
              <td class="px-3 py-2 text-right">${s.L}</td><td class="px-3 py-2 text-right">${s.V}</td>
              <td class="px-3 py-2 text-right">${s.total}</td>
              <td class="px-3 py-2 text-right font-semibold ${s.pct>=75?'text-emerald-600':s.pct>=60?'text-amber-600':'text-red-600'}">${s.pct.toFixed(1)}%</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    toast('Report generated','success');
  });
  $('#rPdf').addEventListener('click',()=>{
    const {from,to,sub,stats}=build();
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(16); doc.text('Trichy Engineering College',14,16);
    doc.setFontSize(10); doc.text('Department of AI & Data Science — Attendance Report',14,22);
    doc.text(`Period: ${from} to ${to}   Subject: ${sub||'All'}`,14,28);
    doc.autoTable({
      startY:34,
      head:[['Reg No','Name','P','A','L','V','Total','%']],
      body:stats.map(s=>[s.student.regNo,s.student.name,s.P,s.A,s.L,s.V,s.total,s.pct.toFixed(1)+'%']),
      styles:{fontSize:9}, headStyles:{fillColor:[37,99,235]}
    });
    doc.save(`attendance_${from}_to_${to}.pdf`);
    toast('PDF downloaded','success');
  });
  $('#rXlsx').addEventListener('click',()=>{
    const {from,to,sub,stats}=build();
    const rows=[['Reg No','Name','Present','Absent','Late','Leave','Total','Percent']];
    stats.forEach(s=>rows.push([s.student.regNo,s.student.name,s.P,s.A,s.L,s.V,s.total,+s.pct.toFixed(2)]));
    const ws=XLSX.utils.aoa_to_sheet(rows); const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Attendance');
    XLSX.writeFile(wb,`attendance_${from}_to_${to}.xlsx`);
    toast('Excel downloaded','success');
  });
  $('#rCsv').addEventListener('click',()=>{
    const {from,to,sub,stats}=build();
    const lines=[['Reg No','Name','Present','Absent','Late','Leave','Total','Percent'].join(',')];
    stats.forEach(s=>lines.push([s.student.regNo,`"${s.student.name}"`,s.P,s.A,s.L,s.V,s.total,s.pct.toFixed(2)].join(',')));
    const blob=new Blob([lines.join('\n')],{type:'text/csv'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`attendance_${from}_to_${to}.csv`; a.click();
    toast('CSV downloaded','success');
  });
}
